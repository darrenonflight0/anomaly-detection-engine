# Full Kafka deployment: producer -> Kafka -> consumer/dashboard.
#   docker compose up --build   then open http://localhost:8100
#
# This wires the producer and the detection API as *separate* services that
# communicate only through Kafka, demonstrating the real streaming topology.

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: sentinel-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  api:
    build: .
    container_name: sentinel-api
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8100:8100"
    environment:
      SENTINEL_BUS: kafka
      SENTINEL_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SENTINEL_EMBEDDED_PRODUCER: "false"   # the producer service feeds Kafka instead
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8100"]

  producer:
    build: .
    container_name: sentinel-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SENTINEL_BUS: kafka
      SENTINEL_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: ["python", "-m", "scripts.run_producer", "--rate", "15"]
